name: 원본 레포 동기화 및 번역

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic

      - name: 원본 변경사항 확인
        id: check
        run: |
          UPSTREAM_SHA=$(curl -s https://api.github.com/repos/hesamsheikh/awesome-openclaw-usecases/commits/main | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          if [ -f .upstream-sha ]; then
            STORED_SHA=$(cat .upstream-sha)
          else
            STORED_SHA=""
          fi
          echo "stored_sha=$STORED_SHA" >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_SHA" != "$STORED_SHA" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "변경 감지: $STORED_SHA -> $UPSTREAM_SHA"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "변경 없음"
          fi

      - name: 변경된 파일 목록 가져오기
        if: steps.check.outputs.has_changes == 'true'
        id: changed
        run: |
          STORED_SHA="${{ steps.check.outputs.stored_sha }}"
          UPSTREAM_SHA="${{ steps.check.outputs.upstream_sha }}"

          if [ -z "$STORED_SHA" ]; then
            # 첫 실행: 모든 md 파일
            curl -s "https://api.github.com/repos/hesamsheikh/awesome-openclaw-usecases/git/trees/$UPSTREAM_SHA?recursive=1" \
              | python3 -c "import sys,json; [print(f['path']) for f in json.load(sys.stdin)['tree'] if f['path'].endswith('.md')]" \
              > /tmp/changed_files.txt
          else
            # 이후 실행: 변경된 md 파일만
            curl -s "https://api.github.com/repos/hesamsheikh/awesome-openclaw-usecases/compare/$STORED_SHA...$UPSTREAM_SHA" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f['filename']) for f in d.get('files',[]) if f['filename'].endswith('.md') and f['status'] in ('added','modified')]" \
              > /tmp/changed_files.txt
          fi

          echo "번역할 파일:"
          cat /tmp/changed_files.txt
          COUNT=$(wc -l < /tmp/changed_files.txt)
          echo "file_count=$COUNT" >> $GITHUB_OUTPUT

      - name: 번역 실행
        if: steps.check.outputs.has_changes == 'true' && steps.changed.outputs.file_count > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 .github/scripts/translate.py

      - name: 커밋 및 푸시
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "${{ steps.check.outputs.upstream_sha }}" > .upstream-sha
          git add .

          if git diff --staged --quiet; then
            echo "커밋할 변경사항 없음"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "sync: 원본 레포 업데이트 번역 ($DATE)"
            git push
            echo "푸시 완료"
          fi
